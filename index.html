<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ferreira Wealth">
<meta name="theme-color" content="#0A0C10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Ferreira Wealth OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0A0C10; --panel:#14181F; --panel2:#171C24; --header:#0D1015;
    --grid:#2A303B; --grid-soft:#1E232C;
    --line:rgba(255,255,255,.06); --line-strong:rgba(255,255,255,.12);
    --amber:#D9AE6B; --amber-dim:#8E7A4F; --amber-soft:rgba(217,174,107,.12);
    --cyan:#8FB6DC; --white:#F2F2EE; --muted:#8E96A3;
    --green:#5FCE96; --red:#E08488; --input:#C7D6E6;
    --surface:linear-gradient(180deg,#161B23,#12161D);
    --radius:16px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 16px 40px -24px rgba(0,0,0,.6);
    --shadow-lift:0 2px 6px rgba(0,0,0,.35),0 22px 48px -20px rgba(0,0,0,.55);
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box;}
  html{background:var(--bg);}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--white);
    font-family:var(--sans);font-size:14px;line-height:1.5;
    overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(1100px 520px at 82% -12%, rgba(217,174,107,.06), transparent 60%),
      radial-gradient(900px 620px at -8% 108%, rgba(143,182,220,.045), transparent 60%);}
  ::selection{background:var(--amber);color:#0A0C10;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--grid);border-radius:99px;}
  ::-webkit-scrollbar-thumb:hover{background:#39414E;}
  input,select,button{font-family:var(--sans);}
  a{color:var(--cyan);}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
  #content > *{animation:fadeUp .38s cubic-bezier(.2,.7,.3,1) both;}
  #content > *:nth-child(2){animation-delay:.05s;}
  #content > *:nth-child(3){animation-delay:.09s;}
  #content > *:nth-child(4){animation-delay:.13s;}
  #content > *:nth-child(n+5){animation-delay:.16s;}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{transition:none !important;animation:none !important;}
  }
  .val, td, th, #ticker, .codeBig, input, .tile, table{font-variant-numeric:tabular-nums;}

  #app{display:flex;min-height:100vh;}

  /* ------------------------------- rail --------------------------------- */
  #sidebar{width:240px;flex:none;background:var(--header);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:0 0 12px 0;}
  .brand{padding:26px 22px 18px 22px;border-bottom:1px solid var(--line);margin-bottom:10px;}
  .brand .word{font-family:var(--serif);font-weight:500;font-size:21px;letter-spacing:.4px;color:var(--white);}
  .brand .word em{font-style:normal;color:var(--amber);}
  .brand .sub{color:var(--muted);font-size:10px;margin-top:6px;letter-spacing:1.6px;text-transform:uppercase;}
  .brand .dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;
    margin-right:7px;vertical-align:1px;box-shadow:0 0 8px rgba(95,206,150,.7);}
  .navLabel{padding:14px 24px 5px 24px;font-size:9.5px;letter-spacing:1.8px;color:var(--muted);
    text-transform:uppercase;font-weight:600;}
  .navbtn{display:flex;align-items:center;gap:11px;width:calc(100% - 20px);margin:1px 10px;
    background:none;border:none;color:#AEB4BF;text-align:left;padding:8px 14px;font-size:13px;
    font-weight:500;cursor:pointer;border-radius:9px;letter-spacing:.1px;
    transition:color .15s ease,background .15s ease;}
  .navbtn svg{width:15px;height:15px;flex:none;opacity:.75;}
  .navbtn:hover{color:var(--white);background:rgba(255,255,255,.045);}
  .navbtn.active{color:var(--amber);background:var(--amber-soft);}
  .navbtn.active svg{opacity:1;}
  .navBadge{margin-left:auto;background:var(--red);color:#131313;font-size:9px;font-weight:700;
    min-width:16px;height:16px;border-radius:99px;display:inline-flex;align-items:center;
    justify-content:center;padding:0 4px;}
  .navBadge[hidden]{display:none;}
  .navfoot{margin-top:auto;padding:14px 18px 6px 18px;border-top:1px solid var(--grid-soft);}
  .navfoot button{display:block;width:100%;margin-bottom:7px;font-size:11px;font-weight:500;
    padding:9px 10px;background:transparent;color:var(--muted);border:1px solid var(--grid);
    border-radius:var(--radius-sm);cursor:pointer;letter-spacing:.2px;text-align:left;
    transition:color .15s ease,border-color .15s ease;}
  .navfoot button:hover{color:var(--white);border-color:var(--muted);}
  #saveState{font-size:10px;color:var(--muted);margin-top:8px;padding:0 2px;min-height:14px;}

  /* ------------------------------- main ---------------------------------- */
  #main{flex:1;min-width:0;display:flex;flex-direction:column;}
  #ticker{background:rgba(13,16,21,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    overflow:hidden;white-space:nowrap;padding:8px 0;font-size:11.5px;color:var(--muted);
    display:flex;align-items:center;}
  #tickerInner{flex:1;overflow:hidden;white-space:nowrap;}
  #ticker span{padding:0 20px;}
  #ticker b{color:var(--white);font-weight:600;}
  .eyeBtn{flex:none;background:none;border:1px solid var(--grid);color:var(--muted);cursor:pointer;
    font-size:10px;font-weight:600;letter-spacing:.6px;padding:4px 11px;margin:0 14px;
    border-radius:99px;transition:color .15s ease,border-color .15s ease;}
  .eyeBtn:hover{color:var(--white);border-color:var(--muted);}
  .eyeBtn.on{color:#131313;background:var(--amber);border-color:var(--amber);}
  #content{padding:28px 34px 70px 34px;overflow-y:auto;}

  h1.pagetitle{font-family:var(--serif);font-weight:500;color:var(--white);
    font-size:27px;letter-spacing:.2px;margin:0 0 4px 0;}
  p.pagesub{color:var(--muted);font-size:12.5px;margin:0 0 22px 0;max-width:660px;}

  .grid{display:grid;gap:14px;}
  .g4{grid-template-columns:repeat(4,1fr);}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g2{grid-template-columns:repeat(2,1fr);}
  @media(max-width:1180px){.g4{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(2,1fr);}}

  .tile{background:var(--surface);border:1px solid var(--line);border-top-color:var(--line-strong);
    border-radius:14px;padding:16px 18px 15px 18px;position:relative;box-shadow:var(--shadow);
    transition:transform .25s cubic-bezier(.2,.7,.3,1),box-shadow .25s ease;}
  .tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lift);}
  .tile::before{content:"";position:absolute;top:-1px;left:18px;right:18px;height:2px;
    border-radius:2px;opacity:.9;
    background:linear-gradient(90deg,transparent,var(--amber) 25%,var(--amber) 75%,transparent);}
  .tile.cyan::before{background:linear-gradient(90deg,transparent,var(--cyan) 25%,var(--cyan) 75%,transparent);}
  .tile.green::before{background:linear-gradient(90deg,transparent,var(--green) 25%,var(--green) 75%,transparent);}
  .tile.red::before{background:linear-gradient(90deg,transparent,var(--red) 25%,var(--red) 75%,transparent);}
  .tile.plain::before{background:linear-gradient(90deg,transparent,var(--grid) 25%,var(--grid) 75%,transparent);}
  .tile .lbl{color:var(--muted);font-size:10px;letter-spacing:1.4px;margin-bottom:8px;
    font-weight:600;text-transform:uppercase;}
  .tile .val{color:var(--white);font-size:25px;font-weight:600;letter-spacing:-.4px;}
  .tile .val.sm{font-size:18px;}
  .tile .val.md{font-size:20px;}
  .tile .val.amber{color:var(--amber);}
  .tile .val.cyan{color:var(--cyan);}
  .tile .val.pos{color:var(--green);}
  .tile .val.neg{color:var(--red);}
  .tile .sub{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.45;}

  .panel{background:var(--surface);border:1px solid var(--line);border-top-color:var(--line-strong);
    padding:22px 24px;margin-bottom:16px;border-radius:var(--radius);box-shadow:var(--shadow);}
  .panel h3{color:var(--muted);font-size:10.5px;letter-spacing:1.6px;font-weight:600;
    text-transform:uppercase;margin:0 0 14px 0;border-bottom:1px solid var(--line);
    padding-bottom:11px;}
  .panel h3 span{font-weight:500;letter-spacing:.2px;text-transform:none;}

  .insight{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--amber);
    border-radius:var(--radius-sm);padding:12px 15px;font-size:12.5px;line-height:1.55;color:var(--white);
    box-shadow:0 1px 2px rgba(0,0,0,.3);}
  .insight.good{border-left-color:var(--green);}
  .insight.watch{border-left-color:var(--red);}
  .insight.info{border-left-color:var(--cyan);}
  .insight b{color:var(--amber);}
  .insight.good b{color:var(--green);}
  .insight.watch b{color:var(--red);}
  .insightStack{display:grid;gap:10px;margin-bottom:16px;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{color:var(--muted);text-align:right;font-size:10px;letter-spacing:1.2px;font-weight:600;
    text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--grid);white-space:nowrap;}
  th:first-child,td:first-child{text-align:left;}
  td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--grid-soft);
    color:var(--white);white-space:nowrap;}
  tbody tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.015);}
  td.pos,.pos{color:var(--green);} td.neg,.neg{color:var(--red);}
  td.muted{color:var(--muted);font-style:italic;} td.cyan{color:var(--cyan);}
  td.amber{color:var(--amber);}

  .bar-outer{background:var(--grid-soft);height:6px;width:100%;margin-top:7px;
    border-radius:99px;overflow:hidden;}
  .bar-inner{background:var(--amber);height:6px;border-radius:99px;transition:width .4s ease;}

  label{display:block;font-size:10.5px;color:var(--muted);letter-spacing:.6px;
    font-weight:600;text-transform:uppercase;margin-bottom:5px;margin-top:13px;}
  input[type=text],input[type=number],input[type=date],input[type=password],select{
    width:100%;background:#0B0E13;border:1px solid rgba(255,255,255,.09);color:var(--input);
    padding:9px 11px;font-size:13.5px;border-radius:var(--radius-sm);
    transition:border-color .15s ease,box-shadow .15s ease,background .15s ease;}
  input:focus,select:focus{outline:none;border-color:var(--amber);background:#0D1118;
    box-shadow:0 0 0 3px var(--amber-soft);}
  input.invalid{border-color:var(--red);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .row > div{flex:1;min-width:170px;}

  .btn{background:linear-gradient(180deg,#E5BE7C,#C89A52);color:#17130A;border:none;padding:10px 18px;
    font-weight:600;font-size:12.5px;letter-spacing:.2px;cursor:pointer;margin-top:16px;
    border-radius:var(--radius-sm);
    box-shadow:0 1px 2px rgba(0,0,0,.35),0 6px 16px -8px rgba(217,174,107,.55),inset 0 1px 0 rgba(255,255,255,.28);
    transition:filter .15s ease,transform .08s ease;}
  .btn:hover{filter:brightness(1.06);}
  .btn:active{transform:scale(.97);}
  .btn.secondary{background:rgba(255,255,255,.03);color:var(--cyan);border:1px solid var(--line-strong);
    box-shadow:none;}
  .btn.secondary:hover{border-color:var(--cyan);filter:none;background:rgba(143,182,220,.07);}
  .btn.danger{background:transparent;color:var(--red);border:1px solid var(--line-strong);box-shadow:none;}
  .btn.danger:hover{border-color:var(--red);}
  .btn.small{padding:5px 11px;font-size:11px;margin-top:0;}

  .toggle{display:inline-flex;border:1px solid var(--grid);margin-bottom:12px;
    border-radius:var(--radius-sm);overflow:hidden;}
  .toggle button{background:transparent;color:var(--muted);border:none;padding:8px 15px;
    font-size:11px;font-weight:600;letter-spacing:.6px;cursor:pointer;
    transition:background .15s ease,color .15s ease;}
  .toggle button.on{background:var(--amber);color:#131313;}

  canvas{max-width:100%;}
  .chartWrap{position:relative;height:290px;}
  .flexBetween{display:flex;justify-content:space-between;align-items:center;gap:12px;}

  .banner{background:var(--amber-soft);border:1px solid rgba(217,174,107,.35);color:#D9C193;
    padding:12px 16px;font-size:12px;line-height:1.55;margin-bottom:16px;border-radius:var(--radius-sm);}
  .banner.info{background:rgba(143,174,201,.08);border-color:rgba(143,174,201,.3);color:#AFC6DB;}
  .banner.warn{background:rgba(217,123,126,.08);border-color:rgba(217,123,126,.35);color:#E3A9AB;}
  .banner b{color:var(--white);}

  .modalBg{display:none;position:fixed;inset:0;background:rgba(6,7,10,.72);z-index:50;
    align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
  .modalBg.show{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--line);border-top-color:var(--line-strong);
    width:660px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:24px 28px;
    border-radius:18px;box-shadow:var(--shadow-lift);}
  .modal h3{color:var(--white);font-family:var(--serif);font-weight:500;font-size:19px;
    letter-spacing:.2px;margin-top:0;}
  .closeX{float:right;background:none;border:none;color:var(--muted);font-size:17px;
    cursor:pointer;padding:4px 8px;border-radius:6px;}
  .closeX:hover{color:var(--white);background:rgba(255,255,255,.05);}

  #authOverlay{position:fixed;inset:0;z-index:100;display:flex;
    align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(900px 500px at 50% -12%, rgba(217,174,107,.10), transparent 60%),
      radial-gradient(700px 500px at 100% 110%, rgba(143,182,220,.06), transparent 60%),var(--bg);}
  .authBox{width:424px;max-width:94vw;background:var(--surface);border:1px solid var(--line);
    border-top-color:var(--line-strong);border-radius:20px;padding:34px 36px;box-shadow:var(--shadow-lift);}
  .authBox h2{font-family:var(--serif);font-weight:500;color:var(--white);font-size:26px;
    letter-spacing:.2px;margin:0 0 5px 0;}
  .authBox .sub2{color:var(--muted);font-size:12px;margin-bottom:16px;line-height:1.5;}
  .authBox input{margin-bottom:4px;}
  .authBox .btn{width:100%;margin-top:14px;}
  .authBox .btn.secondary{margin-top:8px;}
  #authMsg{font-size:12px;color:var(--cyan);margin-top:13px;min-height:15px;line-height:1.55;}
  #authMsg.err{color:var(--red);}
  .codeBig{font-size:27px;letter-spacing:7px;color:var(--amber);text-align:center;
    background:var(--bg);border:1px dashed var(--amber-dim);padding:14px;margin:12px 0;
    border-radius:var(--radius-sm);font-weight:600;}
  .authLink{color:var(--muted);font-size:11.5px;text-decoration:underline;cursor:pointer;
    background:none;border:none;padding:0;margin-top:14px;}
  .authLink:hover{color:var(--cyan);}

  input.cellIn{width:100px;padding:6px 8px;font-size:12.5px;text-align:right;}
  .cfTable td{padding:6px 6px;}
  .cfTable input,.cfTable select{padding:7px 8px;font-size:12.5px;}
  .cfTable input.cf-amt{width:100px;text-align:right;}
  .cfTable input.cf-name{min-width:150px;width:100%;}
  .cfTable select{width:auto;min-width:88px;}
  .iconBtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;
    padding:4px 10px;border-radius:6px;}
  .iconBtn:hover{color:var(--red);background:rgba(217,123,126,.08);}
  .filterRow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .filterRow .btn{margin-top:0;}

  .hRow{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--grid-soft);
    font-size:12.5px;line-height:1.5;}
  .hRow:last-child{border-bottom:none;}
  .hDot{flex:none;width:9px;height:9px;border-radius:50%;margin-top:5px;}
  .hDot.ok{background:var(--green);}
  .hDot.warn{background:var(--red);}
  .hDot.info{background:var(--cyan);}
  .hRow .fix{color:var(--muted);font-size:11px;display:block;margin-top:2px;}

  .scoreBar{display:inline-block;width:74px;height:6px;background:var(--grid-soft);
    border-radius:99px;overflow:hidden;vertical-align:middle;margin-left:8px;}
  .scoreBar i{display:block;height:6px;border-radius:99px;background:var(--amber);}

  #mobileBar{display:none;}
  #bottomBar{display:none;}
  #drawer,#drawerScrim{display:none;}

  @media(max-width:880px){
    #sidebar{display:none;}
    #app{flex-direction:column;}
    #mobileBar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:45;
      background:rgba(13,16,21,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
      padding:calc(10px + env(safe-area-inset-top)) 16px 10px 16px;}
    #burgerBtn{background:none;border:none;color:var(--white);cursor:pointer;padding:8px;
      margin-left:-8px;border-radius:8px;display:flex;align-items:center;}
    #burgerBtn svg{width:20px;height:20px;}
    .mWord{font-family:var(--serif);font-weight:500;font-size:17px;letter-spacing:.3px;}
    .mWord em{font-style:normal;color:var(--amber);}
    #mSync{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--green);}
    #drawerScrim{display:block;position:fixed;inset:0;background:rgba(8,9,12,.6);z-index:59;
      opacity:0;transition:opacity .2s ease;pointer-events:none;}
    #drawerScrim.show{opacity:1;pointer-events:auto;}
    #drawer{display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:60;
      width:292px;max-width:84vw;background:var(--header);border-right:1px solid var(--line);
      transform:translateX(-102%);transition:transform .22s ease;overflow-y:auto;
      padding:calc(18px + env(safe-area-inset-top)) 0 calc(18px + env(safe-area-inset-bottom)) 0;}
    #drawer.open{transform:translateX(0);}
    #drawer .brand{padding:6px 22px 16px 22px;}
    #drawer .navbtn{padding:12px 22px;font-size:14px;}
    #drawer .navfoot{padding:14px 18px 4px 18px;}
    #drawer .navfoot button{padding:11px 12px;font-size:12px;}
    #bottomBar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:45;
      background:rgba(13,16,21,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border-top:1px solid var(--line);
      padding:6px 8px calc(6px + env(safe-area-inset-bottom)) 8px;}
    #bottomBar .navbtn,#bottomBar #menuBtn{flex:1;flex-direction:column;gap:3px;
      align-items:center;justify-content:center;padding:7px 2px;border-left:none;
      font-size:9.5px;letter-spacing:.4px;font-weight:600;text-transform:uppercase;
      color:var(--muted);background:none;border:none;cursor:pointer;display:flex;}
    #bottomBar .navbtn svg,#bottomBar #menuBtn svg{width:19px;height:19px;opacity:.8;}
    #bottomBar .navbtn.active{color:var(--amber);background:none;border:none;}
    #bottomBar .navbtn.active svg{opacity:1;}
    #quickAdd{flex:none;width:52px;height:52px;margin:-18px 6px 0 6px;border-radius:50%;
      background:linear-gradient(180deg,#E5BE7C,#C89A52);color:#17130A;border:none;font-size:26px;
      font-weight:500;line-height:1;cursor:pointer;
      box-shadow:0 6px 18px rgba(217,174,107,.4),inset 0 1px 0 rgba(255,255,255,.3);
      display:flex;align-items:center;justify-content:center;}
    #quickAdd:active{transform:scale(.95);}
    #ticker{font-size:10.5px;}
    #tickerInner{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    #tickerInner::-webkit-scrollbar{display:none;}
    #ticker span{padding:0 12px;}
    .eyeBtn{margin:0 10px 0 4px;}
    #content{padding:20px 16px calc(96px + env(safe-area-inset-bottom)) 16px;}
    h1.pagetitle{font-size:22px;}
    p.pagesub{font-size:11.5px;}
    .g4,.g3{grid-template-columns:repeat(2,1fr);}
    .g2{grid-template-columns:1fr;}
    .grid{gap:10px;}

/* deep-merge cloud data over defaults so new fields survive old saves */
function mergeState(cloud){
  if(!cloud || typeof cloud !== 'object') return;
  for(const k of Object.keys(cloud)){
    const v = cloud[k];
    if(Array.isArray(v)) state[k] = v;
    else if(v && typeof v === 'object' && state[k] && typeof state[k] === 'object' && !Array.isArray(state[k])){
      state[k] = Object.assign({}, state[k], v);
      // one level deeper for nested objects like goalDates
      for(const k2 of Object.keys(v)){
        if(v[k2] && typeof v[k2]==='object' && !Array.isArray(v[k2]) && DEFAULT_STATE[k] && DEFAULT_STATE[k][k2] && typeof DEFAULT_STATE[k][k2]==='object'){
          state[k][k2] = Object.assign({}, DEFAULT_STATE[k][k2], v[k2]);
        }

    } else state[k] = v;
  }
  // migrations
  (state.cashflow.items||[]).forEach((it,i)=>{
    if(!it.id) it.id = 'cf_m'+i;
    if(!it.cat) it.cat = it.type==='in' ? 'Income' : 'General';

  if(!cloud.birthDates && cloud.birthDate){

function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function num(v, fallback){ const n = parseFloat(v); return Number.isFinite(n) ? n : (fallback||0); }
function clampNum(v, min, max, fallback){
  const n = parseFloat(v);
  if(!Number.isFinite(n)) return fallback;
  return Math.min(max, Math.max(min, n));

const fmtDate = d => { if(!d) return "-"; const dt=new Date(d); return isNaN(dt) ? esc(d) : dt.toLocaleDateString('en-NZ',{year:'numeric',month:'short',day:'2-digit'}); };
function ageOf(dateStr, on){
  const bd = new Date(dateStr), t = on ? new Date(on) : new Date();
  let a = t.getFullYear()-bd.getFullYear();
  if(t.getMonth()<bd.getMonth() || (t.getMonth()===bd.getMonth() && t.getDate()<bd.getDate())) a--;

/* frequency conversion — one source of truth */
const FREQ = {weekly:52, fortnightly:26, monthly:12, quarterly:4, yearly:1};
const FREQ_LABEL = {weekly:'Week', fortnightly:'Fortnight', monthly:'Month', quarterly:'Quarter', yearly:'Year'};
function toAnnual(amount, freq){ return (Number(amount)||0) * (FREQ[freq]||26); }
function fromAnnual(annual, freq){ return annual / (FREQ[freq]||26); }
const cfAnnual = it => toAnnual(it.amount, it.freq);

function sortedSnaps(){ return [...state.snapshots].filter(s=>s.date).sort((a,b)=> new Date(a.date)-new Date(b.date)); }
function latest(){ const s = sortedSnaps(); return s.length ? s[s.length-1] : null; }
function nBack(n){ const s = sortedSnaps(); const i = s.length-1-n; return i>=0 ? s[i] : null; }
function yoy(){
  const s = sortedSnaps(); if(!s.length) return null;
  const target = new Date(s[s.length-1].date); target.setMonth(target.getMonth()-12);
  let c=null; for(const r of s){ if(new Date(r.date) <= target) c=r; } return c;
}
function propValue(s){ return state.valuationBasis==="bank" ? (s.bankValue||0) : (s.marketValue||0); }

/* --------------------- ASSET CLASSIFICATION ENGINE ---------------------
   One function, one meaning. Everything on every page derives from this.
   netWorth       — everything you own minus everything you owe
   investable     — cash + offset + Joint Kernel + Hatch (deployable money)
   fireAssets     — investable (+ KiwiSaver only if toggled on)
   locked         — KiwiSaver (retirement-locked, shown separately)
   babyFund       — Baby cash + Baby Kernel (ring-fenced, never FIRE)
   committed      — baby / house-deposit pool / emergency / offset views   */
function classify(l){
  if(!l) return null;
  const cash = (l.cashSavings||0) + (l.cashBuffer||0);
  const offset = l.offset||0;
  const investable = cash + offset + (l.jointKernel||0) + (l.hatch||0);
  const locked = (l.duardKS||0) + (l.hollyKS||0);
  const babyFund = (l.babyCash||0) + (l.babyKernel||0);
  const propEquity = propValue(l) - (l.mortgage||0);
  const totalAssets = cash + offset + (l.jointKernel||0) + (l.hatch||0) + locked + babyFund +
    propValue(l) + (l.carsValue||0) + (l.holidaySavings||0);
  const totalLiabilities = (l.mortgage||0) + (l.otherDebts||0);
  const netWorth = totalAssets - totalLiabilities;
  const a = state.assumptions;
  let fireAssets = investable;
  if(a.includeKiwiSaverInFIRE) fireAssets += locked;
  return {
    netWorth, totalAssets, totalLiabilities, investable, locked, babyFund, propEquity,
    fireAssets,
    committed: {
      baby: babyFund,
      deposit: (l.cashSavings||0) + offset,
      emergency: l.cashSavings||0,
      offset: offset,
      holiday: l.holidaySavings||0
    }
  };
}

/* ------------------------- FINANCE PRIMITIVES -------------------------- */
function pmtAnnual(principal, rate, years){
  if(principal<=0) return 0;
  if(rate<=0) return principal/Math.max(1,years);
  return principal * rate / (1 - Math.pow(1+rate, -years));
}
function amortizePath(balance, rate, annualPayment, years){
  const path=[balance]; let interestY1=0, principalY1=0, b=balance;
  for(let y=1;y<=years;y++){
    const interest = b*rate;
    const principal = Math.min(b, Math.max(0, annualPayment - interest));
    if(y===1){ interestY1=interest; principalY1=principal; }
    b = Math.max(0, b - principal);
    path.push(b);
  }
  return {path, interestY1, principalY1};
}
function ksAnnualTotal(){
  const k=state.kiwisaver, inc=state.income;
  const m = k.employerMatch ? 2 : 1;
  return inc.pretaxH*k.rateH*m + inc.pretaxD*k.rateD*m;
}
function cashflowAnnual(){
  const all = state.cashflow.items;
  const inA  = all.filter(i=>i.type==='in').reduce((s,i)=>s+cfAnnual(i),0);
  const outA = all.filter(i=>i.type==='out').reduce((s,i)=>s+cfAnnual(i),0);
  return {inA, outA, net: inA-outA, rate: inA ? (inA-outA)/inA : 0};
}

/* --------------------------- PROJECTION CORE ---------------------------
   One engine drives Projections, Scenarios, FIRE, Goals milestones and
   the Property Decision Engine's investment leg.                        */
function projectWealth(opts){
  const o = Object.assign({years:45, rAdj:0, contribOverride:null}, opts||{});
  const l = latest(); if(!l) return null;
  const k = classify(l); const a = state.assumptions;
  const r = Math.max(0, a.investReturn + o.rAdj);
  const contrib = o.contribOverride!==null ? o.contribOverride : a.annualContribution;
  const ksC = ksAnnualTotal();
  const mortPay = state.income.mortgageFortnightly*26;
  const am = amortizePath(l.mortgage||0, a.mortgageRate, mortPay, o.years);
  let fire=k.fireAssets, locked=k.locked, baby=k.babyFund;
  const out = {fire:[fire], locked:[locked], baby:[baby], prop:[k.propEquity], nw:[k.netWorth]};
  const flat = (l.carsValue||0) + (l.holidaySavings||0);
  const lockedInFire = a.includeKiwiSaverInFIRE; // if on, "fire" already contains KS; don't double-count
  for(let n=1;n<=o.years;n++){
    fire   = fire*(1+r) + contrib + (lockedInFire ? ksC : 0);
    locked = locked*(1+r) + ksC;
    baby   = baby*(1+r) + a.babyMonthlyContribution*12;
    const prop = propValue(l)*Math.pow(1+a.propertyGrowth, n) - am.path[n];
    out.fire.push(fire); out.locked.push(locked); out.baby.push(baby); out.prop.push(prop);
    out.nw.push(fire + (lockedInFire ? 0 : locked) + baby + prop + flat);
  }
  return out;
}
function yearsUntil(series, target){
  for(let n=0;n<series.length;n++){ if(series[n]>=target) return n; }
  return null;
}

/* FIRE mathematics */
function fireNumbers(){
  const l = latest(); if(!l) return null;
  const k = classify(l); const a = state.assumptions;
  const cf = cashflowAnnual();
  const spendBase = Math.max(1, cf.outA);
  const swr = a.safeWithdrawal || 0.04;
  const targets = {
    lean: Math.round(spendBase*0.8/swr),
    base: Math.round(spendBase/swr),
    fat:  Math.round(spendBase*1.3/swr),
    set:  a.fireTarget
  };
  const p = projectWealth({});
  const yrsSet  = p ? yearsUntil(p.fire, targets.set)  : null;
  const yrsLean = p ? yearsUntil(p.fire, targets.lean) : null;
  const yrsBase = p ? yearsUntil(p.fire, targets.base) : null;
  const yrsFat  = p ? yearsUntil(p.fire, targets.fat)  : null;
  const passive = k.fireAssets * swr;
  const aD = duardAge(), aH = hollyAge();
  const yearsTo65 = Math.max(1, 65 - Math.min(aD,aH));
  const coastNumber = targets.base / Math.pow(1+a.investReturn, yearsTo65);
  return {k, swr, spendBase, targets, yrsSet, yrsLean, yrsBase, yrsFat, passive,
    coastNumber, coastReached: k.fireAssets>=coastNumber, aD, aH};
}

/* --------------------- PROPERTY DECISION ENGINE ------------------------ */
function propertyScenarios(){
  const l = latest(); if(!l) return null;
  const a = state.assumptions, ri = state.ratesInsurance, inc = state.income;
  const k = classify(l);
  const mkt = l.marketValue||0, mort = l.mortgage||0;
  const rentIn = inc.rentReceivedFortnightly*26;
  const hbRentOut = a.hbRentPaidFortnightly*26;
  const homeCostsOwn = ri.rates + ri.landlordInsurance + a.maintenanceAnnual; // holding costs excl. mortgage
  const contentsA = ri.contentsInsurance*12;
  const hbCostsOwn = a.hbRatesAnnual + a.hbInsuranceAnnual + a.maintenanceAnnual;
  const mortPay = inc.mortgageFortnightly*26;
  const yrs = a.mortgageYearsRemaining;
  const requiredDep = a.hbPrice * a.hbDepositPct;
  const depositPool = (l.cashSavings||0) + (l.offset||0);
  const proceeds = mkt - a.sellingCosts - mort; // can be negative

  function investPath(invest0, annualContrib, years){
    let v = invest0; const p=[v];
    for(let n=1;n<=years;n++){ v = v*(1+a.investReturn) + annualContrib; p.push(v); }
    return p;
  }
  function ownPath(value0, growth, mort0, pay, years){
    const am = amortizePath(mort0, a.mortgageRate, pay, years);
    const p=[]; for(let n=0;n<=years;n++){ p.push(value0*Math.pow(1+growth,n) - am.path[n]); }
    return {p, am};
  }
  const constants = n => k.locked*Math.pow(1+a.investReturn,n) + k.babyFund*Math.pow(1+a.investReturn,n) + (l.carsValue||0) + (l.holidaySavings||0);

  const base = state.assumptions.annualContribution; // scenario A investing pace
  const scen = {};

  // A — Rentvest: keep the home property rented out, rent in the second city
  {
    const cost = mortPay + homeCostsOwn + hbRentOut - rentIn;
    const own = ownPath(mkt, a.propertyGrowth, mort, mortPay, 10);
    const inv = investPath(k.investable, base, 10);
    scen.A = {name:'Rentvest', desc:'Keep '+cityHome()+' as a rental, rent in '+citySecond()+', keep investing.',
      cost, invest:inv, prop:own.p, gap:0, debt:mort, feasible:true,
      flex:7, life:6, risk:5};
  }
  // B — Sell the home property, buy in the second city
  {
    const liquid = k.investable + proceeds; // everything freed up after sale (can be negative)
    const gap = Math.max(0, requiredDep - liquid);
    const depositApplied = Math.max(0, Math.min(a.hbPrice, liquid)); // only money that actually exists
    const newMort = Math.max(0, a.hbPrice - depositApplied);
    const newPay = pmtAnnual(newMort, a.mortgageRate, 30);
    const cost = newPay + a.hbRatesAnnual + contentsA + a.maintenanceAnnual;
    const invest0 = Math.max(0, liquid - depositApplied);
    const costDelta = scen.A.cost - cost;
    const own = ownPath(a.hbPrice, a.hbPropertyGrowth, newMort, newPay, 10);
    const inv = investPath(invest0, base + costDelta, 10);
    scen.B = {name:'Sell & buy in '+citySecond(), desc:'Sell '+cityHome()+' at market value, clear the mortgage, buy in '+citySecond()+'.',
      cost, invest:inv, prop:own.p, gap, debt:newMort, feasible:gap<=0,
      proceeds, newMort, newPay, flex:4, life:9, risk:6 + (gap>0?2:0)};
  }
  // C — Keep the home property AND buy a second house in the second city
  {
    const gap = Math.max(0, requiredDep - depositPool);
    const depositApplied = Math.min(depositPool, a.hbPrice); // only real money
    const newMort = Math.max(0, a.hbPrice - depositApplied);
    const newPay = pmtAnnual(newMort, a.mortgageRate, 30);
    const cost = mortPay + homeCostsOwn - rentIn + newPay + hbCostsOwn + contentsA;
    const costDelta = scen.A.cost - cost;
    const ownW = ownPath(mkt, a.propertyGrowth, mort, mortPay, 10);
    const ownH = ownPath(a.hbPrice, a.hbPropertyGrowth, newMort, newPay, 10);
    const inv = investPath(Math.max(0, k.investable - depositApplied), base + costDelta, 10);
    scen.C = {name:'Keep '+cityHome()+' + buy second', desc:'Keep '+cityHome()+' rented, buy in '+citySecond()+' on top.',
      cost, invest:inv, prop:ownW.p.map((v,i)=>v+ownH.p[i]), gap,
      debt:mort+newMort, feasible:gap<=0, newMort, newPay, flex:2, life:8, risk:8 + (gap>0?1:0)};
  }
  // D — Sell the home property, rent, invest everything
  {
    const invest0 = Math.max(0, k.investable + proceeds);
    const cost = hbRentOut;
    const costDelta = scen.A.cost - cost;
    const inv = investPath(invest0, base + costDelta, 10);
    scen.D = {name:'Rent & invest', desc:'Sell '+cityHome()+', keep renting, put everything into investments.',
      cost, invest:inv, prop:inv.map(()=>0), gap:0, debt:0, feasible:true,
      proceeds, flex:9, life:5, risk:3};
  }

  for(const key of ['A','B','C','D']){
    const s = scen[key];
    s.nw5  = s.invest[5]  + s.prop[5]  + constants(5);
    s.nw10 = s.invest[10] + s.prop[10] + constants(10);
    s.cashMo = s.cost/12;
  }
  const ranked = ['A','B','C','D'].sort((x,y)=> scen[y].nw10 - scen[x].nw10);
  return {scen, ranked, requiredDep, depositPool, proceeds, mortPay, rentIn, homeCostsOwn};
}

async function doSignUp(){
  const email=($('#a_email').value||'').trim(), pass=$('#a_pass').value||'';
  if(!email || pass.length<6){ authMsg('Enter an email and a password of at least 6 characters.', true); return; }
  authMsg('Creating account…');
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if(error){ authMsg(error.message, true); return; }
  if(!data.session){ authMsg('Account created — check your email for a confirmation link, then come back and sign in.'); }
}
async function doSignIn(){
  const email=($('#a_email').value||'').trim(), pass=$('#a_pass').value||'';
  authMsg('Signing in…');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error){ authMsg(error.message, true); }
}
async function doSignOut(){
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} rtChannel=null; }
  householdId=null; joinCode=""; householdName="";
  await sb.auth.signOut();
}
async function doCreateHousehold(){
  const name=($('#h_name').value||'').trim();
  if(!name){ authMsg('Give your household a name first.', true); return; }
  authMsg('Creating…');
  const { error } = await sb.rpc('create_household', { p_name: name });
  if(error){ authMsg(error.message, true); return; }
  await enterHousehold();
  authUI(accountScreen());
  authMsg('Household created. Give this code to your partner so they can join — it lives under Account & invite whenever you need it.');
}
async function doJoinHousehold(){
  const code=($('#h_code').value||'').trim().toUpperCase();
  if(code.length<4){ authMsg('Enter the 6-character invite code.', true); return; }
  authMsg('Joining…');
  const { error } = await sb.rpc('join_household', { p_code: code });
  if(error){ authMsg(error.message.includes('Invalid')?'Invalid invite code — double-check it with your partner.':error.message, true); return; }
  await enterHousehold();
}
async function enterHousehold(){
  const { data: mem, error } = await sb.from('household_members')
    .select('household_id, households(name, join_code)').eq('user_id', myUserId).limit(1);
  if(error){ authMsg(error.message, true); return; }
  if(!mem || !mem.length){ authUI(householdScreen()); return; }
  householdId = mem[0].household_id;
  householdName = (mem[0].households && mem[0].households.name) || "";
  joinCode = (mem[0].households && mem[0].households.join_code) || "";
  await loadCloudState();
  startRealtime();
  hideAuth();
  render();
}
async function loadCloudState(){
  try{
    const { data, error } = await sb.from('household_data').select('data').eq('household_id', householdId).single();
    if(error) throw error;
    if(data && data.data && Object.keys(data.data).length){
      mergeState(data.data);
      setSaveState('Cloud data loaded');
    } else {
      setSaveState('New household — seed values saved to cloud');
      persistNow();
    }
    try{ localStorage.setItem(CACHE_KEY, JSON.stringify(state)); }catch(e){}
  }catch(e){
    try{
      const raw = localStorage.getItem(CACHE_KEY);
      if(raw) mergeState(JSON.parse(raw));
      setSaveState('Offline — showing this device\'s cached copy');
    }catch(e2){ setSaveState('Could not load cloud data'); }
  }
}
let saveTimer=null;
function persist(){
  setSaveState('Saving…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistNow, 500);
}
async function persistNow(){
  if(DEMO){ setSaveState('Demo mode — nothing is saved'); return; }
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify(state)); }catch(e){}
  if(!sb || !householdId){ setSaveState('Not signed in — saved on this device only'); return; }
  const { error } = await sb.from('household_data')
    .update({ data: state, updated_at: new Date().toISOString(), updated_by: myUserId })
    .eq('household_id', householdId);
  if(error){ setSaveState('Cloud save failed — kept a local copy'); }
  else { setSaveState('Synced ' + new Date().toLocaleTimeString()); }
}
function startRealtime(){
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} }
  rtChannel = sb.channel('household-' + householdId)
    .on('postgres_changes',
      { event:'UPDATE', schema:'public', table:'household_data', filter:'household_id=eq.'+householdId },
      payload => {
        const row = payload.new;
        if(row && row.updated_by && row.updated_by !== myUserId){
          mergeState(row.data || {});
          render();
          setSaveState('Live update from ' + esc(householdName||'your household'));
        }
      })
    .subscribe();
}

function topInsights(n){
  const out = [];
  if(DEMO) out.push(`<div class="insight info">You're exploring the <b>demo household</b> — every number here is fictional, and nothing you change is saved. Ready to track your own? <a href="#" onclick="authUI(loginScreen('signup'));return false;">Create a free account</a>.</div>`);
  const l = latest(); if(!l) return out;
  const k = classify(l);
  const cf = cashflowAnnual();
  const prev = nBack(1);
  if(prev){
    const d = k.netWorth - classify(prev).netWorth;
    out.push(`<div class="insight ${d>=0?'good':'watch'}">Net worth ${d>=0?'is up':'is down'} <b>${money(Math.abs(d))}</b> since your last update.</div>`);
  }
  if(cf.rate > 0.4) out.push(`<div class="insight good">A <b>${pct(cf.rate)}</b> savings rate is exceptional — at this pace, every year of work buys roughly ${(cf.rate/(1-cf.rate)).toFixed(1)} years of freedom.</div>`);
  else if(cf.rate > 0) out.push(`<div class="insight">Your savings rate is <b>${pct(cf.rate)}</b>. Nudging it higher moves your FIRE date more than investment returns do.</div>`);
  const f = fireNumbers();
  if(f && f.coastReached) out.push(`<div class="insight good">You've passed <b>Coast FIRE</b> — even with zero further contributions, growth alone should reach your base target by 65.</div>`);
  const issues = healthChecks().filter(h=>h.level==='warn');
  if(issues.length) out.push(`<div class="insight watch"><b>${issues.length} data-health ${issues.length===1?'item needs':'items need'} attention</b> — see the Data health page.</div>`);
  return out.slice(0, n);
}
function holdingsRows(l){
  const rows = [
    ["Cash savings","Investable · Emergency", l.cashSavings],
    ["Cash buffer","Investable", l.cashBuffer],
    ["Offset","Investable · Committed", l.offset],
    ["Joint Kernel","Investable · FIRE", l.jointKernel],
    ["Hatch","Investable · FIRE", l.hatch],
    [personLabel("Duard")+" KiwiSaver","Locked retirement", l.duardKS],
    [personLabel("Holly")+" KiwiSaver","Locked retirement", l.hollyKS],
    ["Baby cash","Ring-fenced", l.babyCash],
    ["Baby Kernel","Ring-fenced", l.babyKernel],
    ["Holiday savings","Committed", l.holidaySavings],
    ["Cars","Lifestyle asset", l.carsValue],
    [`Property equity (${state.valuationBasis})`,"Property", propValue(l)-(l.mortgage||0)]
  ];
  const denom = rows.reduce((s,[,,v])=> s + Math.max(0, v||0), 0);
  return rows.map(([name,cls,val])=>{
    const v = val||0;
    if(v < 0) return `<tr><td>${name}</td><td class="muted">${cls}</td><td class="neg">${money(v)}</td><td class="muted">—</td></tr>`;
    const p = denom ? v/denom : 0;
    return `<tr><td>${name}</td><td class="muted">${cls}</td><td>${money(v)}</td><td class="cyan">${pct(p)}<span class="scoreBar"><i style="width:${Math.min(100,p*100)}%"></i></span></td></tr>`;
  }).join("");
}
function rowNonPropAssets(r){
  return (r.cashSavings||0)+(r.cashBuffer||0)+(r.offset||0)+(r.jointKernel||0)+(r.babyCash||0)+
    (r.babyKernel||0)+(r.hatch||0)+(r.duardKS||0)+(r.hollyKS||0)+(r.carsValue||0)+(r.holidaySavings||0);
}
function drawNetWorthChart(id){
  const ctx = document.getElementById(id); if(!ctx) return;

      {label:'Net worth (bank)', data:bank, borderColor:'#3987E5', borderDash:[5,3], fill:false, tension:.25, pointRadius:2}

function renderReview(c){
  const l = latest();
  c.innerHTML = `<h1 class="pagetitle">Monthly review</h1>
    <p class="pagesub">Your latest snapshot against the previous one, and the same time last year when you have the history.</p>`;
  if(!l){ c.innerHTML += `<div class="banner info">Add a snapshot first.</div>`; return; }
  const prev = nBack(1), yr = yoy();
  if(!prev){
    c.innerHTML += `<div class="banner info">This is your first snapshot — log a second one and this page becomes a proper month-on-month review.</div>`;
    return;
  }
  const kNow = classify(l), kPrev = classify(prev), kYr = yr ? classify(yr) : null;
  const invNow = (l.jointKernel||0)+(l.hatch||0)+(l.duardKS||0)+(l.hollyKS||0)+(l.babyKernel||0);
  const invPrev = (prev.jointKernel||0)+(prev.hatch||0)+(prev.duardKS||0)+(prev.hollyKS||0)+(prev.babyKernel||0);
  const cashNow = (l.cashSavings||0)+(l.cashBuffer||0)+(l.offset||0);
  const cashPrev = (prev.cashSavings||0)+(prev.cashBuffer||0)+(prev.offset||0);
  const deltas = [
    ['Net worth', kNow.netWorth, kPrev.netWorth, kYr?kYr.netWorth:null],
    ['Investable assets', kNow.investable, kPrev.investable, kYr?kYr.investable:null],
    ['FIRE assets', kNow.fireAssets, kPrev.fireAssets, kYr?kYr.fireAssets:null],
    ['Cash & offset', cashNow, cashPrev, kYr?(yr.cashSavings||0)+(yr.cashBuffer||0)+(yr.offset||0):null],
    ['Investment balances', invNow, invPrev, yr?(yr.jointKernel||0)+(yr.hatch||0)+(yr.duardKS||0)+(yr.hollyKS||0)+(yr.babyKernel||0):null],
    ['Mortgage', l.mortgage||0, prev.mortgage||0, yr?(yr.mortgage||0):null],
    ['Property value ('+state.valuationBasis+')', propValue(l), propValue(prev), yr?propValue(yr):null]
  ];
  const movers = deltas.slice(0,5).map(d=>({name:d[0], d:d[1]-d[2]})).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
  const wins = [], watch = [];
  deltas.forEach(([name,now,pv])=>{
    const d = now-pv;
    const better = name==='Mortgage' ? d<0 : d>0;
    if(Math.abs(d)<1) return;
    (better?wins:watch).push(`<div class="hRow"><span class="hDot ${better?'ok':'warn'}"></span><div>${name} ${d>=0?'+':''}${money(d)}</div></div>`);
  });
  healthChecks().filter(h=>h.level==='warn').forEach(h=>{
    watch.push(`<div class="hRow"><span class="hDot warn"></span><div>${h.msg}<span class="fix">${h.fix}</span></div></div>`);
  });
  const mortgageDown = (prev.mortgage||0)-(l.mortgage||0);
  const summary = `Between ${fmtDate(prev.date)} and ${fmtDate(l.date)}, net worth ${kNow.netWorth-kPrev.netWorth>=0?'rose':'fell'} ${money(Math.abs(kNow.netWorth-kPrev.netWorth))}. `
    + `The biggest mover was ${movers[0].name.toLowerCase()} (${movers[0].d>=0?'+':''}${money(movers[0].d)}). `
    + (mortgageDown>0?`You paid the mortgage down by ${money(mortgageDown)}. `:``)
    + (kYr?`Compared with roughly a year ago, net worth is ${kNow.netWorth-kYr.netWorth>=0?'up':'down'} ${money(Math.abs(kNow.netWorth-kYr.netWorth))} (${pct((kNow.netWorth-kYr.netWorth)/Math.abs(kYr.netWorth||1))}).`:`Once you have a year of history, this summary adds a year-on-year read.`);
  c.innerHTML += `
    <div class="insight" style="margin-bottom:16px;">${summary}</div>
    <div class="grid g4" style="margin-bottom:16px;">
      <div class="tile"><div class="lbl">Net worth change</div><div class="val sm ${kNow.netWorth-kPrev.netWorth>=0?'pos':'neg'}">${(kNow.netWorth-kPrev.netWorth>=0?'+':'')+money(kNow.netWorth-kPrev.netWorth)}</div></div>
      <div class="tile cyan"><div class="lbl">FIRE asset change</div><div class="val sm ${kNow.fireAssets-kPrev.fireAssets>=0?'pos':'neg'}">${(kNow.fireAssets-kPrev.fireAssets>=0?'+':'')+money(kNow.fireAssets-kPrev.fireAssets)}</div></div>
      <div class="tile green"><div class="lbl">Mortgage reduction</div><div class="val sm ${mortgageDown>=0?'pos':'neg'}">${mortgageDown>=0?'-':'+'}${money(Math.abs(mortgageDown))}</div></div>
      <div class="tile plain"><div class="lbl">Biggest mover</div><div class="val sm">${movers[0].name}</div><div class="sub">${movers[0].d>=0?'+':''}${money(movers[0].d)}</div></div>
    </div>
    <div class="panel" style="overflow-x:auto;">
      <h3>The numbers</h3>
      <table><thead><tr><th>Metric</th><th>Now</th><th>Previous</th><th>Change</th><th class="hide-sm">~1 year ago</th><th class="hide-sm">vs year</th></tr></thead><tbody>
      ${deltas.map(([name,now,pv,y])=>{
        const d=now-pv, dy = y===null?null:now-y;
        const good = name==='Mortgage' ? d<=0 : d>=0;
        const goodY = y===null?null:(name==='Mortgage' ? dy<=0 : dy>=0);
        return `<tr><td>${name}</td><td>${money(now)}</td><td>${money(pv)}</td>
          <td class="${good?'pos':'neg'}">${d>=0?'+':''}${money(d)}</td>
          <td class="hide-sm">${y===null?'<span class="muted">n/a</span>':money(y)}</td>
          <td class="hide-sm ${dy===null?'':(goodY?'pos':'neg')}">${dy===null?'<span class="muted">n/a</span>':(dy>=0?'+':'')+money(dy)}</td></tr>`;
      }).join('')}
      </tbody></table>
    </div>
    <div class="grid g2">
      <div class="panel"><h3>Wins</h3>${wins.join('')||'<div class="sub">Nothing moved forward this period.</div>'}</div>
      <div class="panel"><h3>Watch items</h3>${watch.join('')||'<div class="sub">Nothing needs attention. Clean sheet.</div>'}</div>
    </div>`;
}

function renderLog(c){
  const rows = sortedSnaps().slice().reverse();
  c.innerHTML = `<h1 class="pagetitle">Snapshot log</h1>

function logRows(rows){
  const chron = sortedSnaps();
  return rows.map(r=>{
    const k = classify(r);
    const i = chron.findIndex(x=>x===r);
    const prevK = i>0 ? classify(chron[i-1]) : null;
    const change = prevK ? k.netWorth - prevK.netWorth : null;
    const origIdx = state.snapshots.indexOf(r);
    return `<tr>
      <td>${fmtDate(r.date)}</td><td class="muted">${esc(r.period||'-')}</td>
      <td class="amber">${money(k.netWorth)}</td>
      <td class="${change===null?'muted':(change>=0?'pos':'neg')}">${change===null?'—':(change>=0?'+':'')+money(change)}</td>
      <td class="cyan">${pct(k.fireAssets/state.assumptions.fireTarget)}</td>
      <td class="hide-sm">${money(r.bankValue)}</td><td class="hide-sm">${money(r.marketValue)}</td><td class="hide-sm">${money(r.mortgage)}</td>
      <td><button class="btn small secondary" onclick="openModal(${origIdx})">Edit</button>
          <button class="iconBtn" aria-label="Delete entry" onclick="deleteEntry(${origIdx})">✕</button></td></tr>`;
  }).join('');
}
function openModal(idx){
  editIndex = (typeof idx==='number') ? idx : null;
  const r = editIndex!==null ? state.snapshots[editIndex] : Object.assign({}, latest()||{}, {date:new Date().toISOString().slice(0,10), notes:""});
  $('#entryModalTitle').textContent = editIndex!==null ? 'Edit entry' : 'New snapshot entry';
  $('#entryForm').innerHTML = `<div class="row">` + getFieldDefs().map(([key,label,type,opts])=>{
    if(type==='select') return `<div><label>${label}</label><select id="f_${key}">${opts.map(o=>`<option ${r[key]===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
    const v = r[key]!==undefined && r[key]!==null ? (type==='text'?esc(r[key]):r[key]) : (type==='number'?0:'');
    return `<div><label>${label}</label><input type="${type}" ${type==='number'?'step="0.01" inputmode="decimal"':''} id="f_${key}" value="${v}"></div>`;
  }).join('') + `</div>`;
  $('#entryModal').classList.add('show');
}
function closeModal(){ $('#entryModal').classList.remove('show'); }
function saveEntry(){
  const r = {};
  let valid = true;
  getFieldDefs().forEach(([key,label,type])=>{
    const el = $('#f_'+key); if(!el) return;
    if(type==='number'){
      const n = clampNum(el.value===''?0:el.value, -100000000, 100000000, null);
      if(n===null){ el.classList.add('invalid'); valid=false; } else { el.classList.remove('invalid'); r[key]=n; }
    } else r[key] = el.value;
  });
  if(!valid) return;
  if(!r.date){ $('#f_date').classList.add('invalid'); return; }
  if(editIndex!==null) state.snapshots[editIndex] = r; else state.snapshots.push(r);
  persist(); closeModal(); render();
}
function deleteEntry(idx){
  if(!confirm("Delete this snapshot entry?")) return;
  state.snapshots.splice(idx,1); persist(); render();
}

}

function requiredContribution(current, target, dateStr, annualRate){
  if(!dateStr) return null;
  const months = (new Date(dateStr) - new Date())/(1000*60*60*24*30.44);
  if(target <= current) return {done:true};
  if(months < 1) return {overdue:true, gap:target-current};
  const r = (annualRate||0)/12;
  let m;
  if(r>0){ const g = Math.pow(1+r, months); m = (target - current*g)*r/(g-1); }
  else m = (target-current)/months;
  return {monthly:Math.max(0,m), fortnightly:Math.max(0,m*12/26), months:Math.round(months)};
}
function paceProjection(accessor, target){
  const s = sortedSnaps();
  if(s.length < 2) return null;
  const first = s[0], last = s[s.length-1];
  const months = Math.max(0.5, (new Date(last.date)-new Date(first.date))/(1000*60*60*24*30.44));
  const pace = (accessor(last)-accessor(first))/months;
  if(pace <= 0) return {stalled:true};
  const monthsLeft = (target-accessor(last))/pace;
  if(monthsLeft <= 0) return {done:true};
  const d = new Date(); d.setMonth(d.getMonth()+Math.ceil(monthsLeft));
  return {date:d, pace};
}

function healthChecks(){
  const out = [];
  const push = (level, msg, fix)=> out.push({level, msg, fix});
  const l = latest();
  const daysOld = d => Math.floor((new Date() - new Date(d))/(1000*60*60*24));
  // demo data
  if(state.snapshots.length===1 && state.snapshots[0].notes==='Starter row'){
    push('info','You\u2019re looking at the seed/demo starter data.','Log a fresh snapshot to make it yours — the seed row can then be edited or deleted.');
  }
  if(!l){ push('warn','No snapshot data at all.','Add your first entry on the Snapshot log.'); return out; }
  const age = daysOld(l.date);
  if(age > 35) push('warn','Latest snapshot is '+age+' days old.','Log a fresh snapshot — everything downstream is only as current as this.');
  else push('ok','Latest snapshot is '+age+' day'+(age===1?'':'s')+' old — nicely current.','');
  if(age > 90) push('warn','Property value and mortgage are over 90 days stale.','Update them via Property → Keep values current.');
  const s = sortedSnaps();
  if(s.length>=2 && s[s.length-1].mortgage === s[s.length-2].mortgage)
    push('info','Mortgage balance hasn\u2019t changed between your last two snapshots.','It should fall a little each period — grab the live balance from your bank.');
  if(s.length>=3 && s.slice(-3).every(r=>r.marketValue===s[s.length-1].marketValue))
    push('info','Market value has been identical for 3 entries.','Check homes.co.nz for a fresh estimate.');
  // income & cashflow
  const hollyIn = state.cashflow.items.some(i=>i.type==='in' && i.owner==='Holly' && cfAnnual(i)>0);
  if(!hollyIn || !(state.income.posttaxFortH>0)) push('warn', esc(personLabel('Holly'))+'\u2019s income looks missing or zero.','Check the Income page and the Cash flow "in" items.');
  else push('ok','Both incomes present.','');
  const zeroItems = state.cashflow.items.filter(i=>!(Number(i.amount)>0));
  if(zeroItems.length) push('warn', zeroItems.length+' cash-flow item'+(zeroItems.length===1?' has':'s have')+' a zero or missing amount.','Fill in or delete: '+zeroItems.map(i=>esc(i.name)).join(', ')+'.');
  const noCat = state.cashflow.items.filter(i=>!i.cat || i.cat==='General');
  if(noCat.length) push('info', noCat.length+' cash-flow item'+(noCat.length===1?'':'s')+' sitting in "General".','Categorise them so the spending doughnut means something.');
  // assumptions
  if(state.assumptions.hbRentPaidFortnightly===DEFAULT_STATE.assumptions.hbRentPaidFortnightly)
    push('info', esc(citySecond())+' rent is still the starter estimate ($'+state.assumptions.hbRentPaidFortnightly+'/fn).','Set your real expected rent on the Decision engine.');
  if(!state.assumptions.babyBirthDate) push('info','No baby birth date set.','Add it on the Baby fund page for accurate age-18 projections.');
  // connection
  if(DEMO) push('info','Demo mode — edits stay in this preview and are never saved.','Create an account to start tracking your own household.');
  else if(!isConfigured()) push('warn','Supabase isn\u2019t configured in this copy.','Data is device-only until the config lines are filled in.');
  else if(!householdId) push('info','Not signed in — changes save to this device only.','Sign in to sync with your household.');
  else push('ok','Connected to Supabase and syncing with '+esc(householdName||'your household')+'.','');
  return out;
}

    </div>
    <div class="panel"><h3>How your data is protected</h3>
      <div class="hRow"><span class="hDot ok"></span><div>Real household data lives in Supabase, gated by your email + password logins and row-level security — only household members can read or write it.</div></div>
      <div class="hRow"><span class="hDot ok"></span><div>This device keeps an offline cache (localStorage) so the app opens without signal; it's a cache, not the source of truth.</div></div>
      <div class="hRow"><span class="hDot info"></span><div>If hosted on GitHub Pages, the app's source code is publicly readable. That's expected: it contains only seed/demo values and a publishable key that's designed to be public. Your logged numbers are never in this file.</div></div>
      <div class="hRow"><span class="hDot info"></span><div>Privacy mode (the button on the top strip) hides every dollar figure on this device — handy on the bus. Percentages and trends stay visible. It never syncs, so your partner's screen is unaffected.</div></div>
      <div class="hRow"><span class="hDot ok"></span><div>Export a backup (.json) from the menu every month or two — belt and braces.</div></div>
    </div>`;
}

/* --------------------------------- BOOT ---------------------------------- */
async function boot(){
  buildChrome();
  render();
  if(!isConfigured()){ authUI(configScreen()); return; }
  if(typeof window.supabase === 'undefined'){
    authUI(`<h2>Offline</h2><div class="sub2">Couldn't load the sync library — check your connection and reload. Your cached data is shown behind this message.</div>
    <button class="btn secondary" onclick="hideAuth()">Continue offline</button>`);
    try{ const raw = localStorage.getItem(CACHE_KEY); if(raw) mergeState(JSON.parse(raw)); render(); }catch(e){}
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  if(session){
    myUserId = session.user.id; myEmail = session.user.email || "";
    await enterHousehold();
  } else {
    authUI(loginScreen('signin'));
  }
  sb.auth.onAuthStateChange(async (event, sess)=>{
    if(event === 'SIGNED_IN' && sess && sess.user.id !== myUserId){
      DEMO = false;
      state = JSON.parse(JSON.stringify(DEFAULT_STATE)); // never let demo values bleed into a real household
      myUserId = sess.user.id; myEmail = sess.user.email || "";
      await enterHousehold();
    }
    if(event === 'SIGNED_OUT'){
      DEMO = false;
      myUserId = null; myEmail = "";
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      render();
      authUI(loginScreen('signin'));
    }
  });
}
boot();

</script>
