# Writes a row to a dedicated keepalive table twice a week so the free-tier
# Supabase project always has recent, genuine database activity and doesn't
# get auto-paused.
#
# Why a write instead of a read: an earlier version of this workflow just
# SELECTed from household_data with the public anon key. Row-level security
# correctly blocks that from returning real rows, and Supabase's inactivity
# detector doesn't appear to count it as meaningful usage — the project still
# got flagged for pausing despite the workflow running successfully on
# schedule. A real INSERT/UPDATE against the database is unambiguous activity.
#
# One-time setup required (see README.md "Keeping the free Supabase project
# awake" for the full walkthrough):
#   1. Run the SQL in that section once, in the Supabase SQL editor, to create
#      the `_keepalive` table (RLS-locked to service_role only).
#   2. Add a repository secret named SUPABASE_SERVICE_ROLE_KEY with the
#      project's service_role key (Project Settings → API in Supabase).
#      This key bypasses row-level security — it must live ONLY as a GitHub
#      secret, never in index.html or anywhere else in this repo.
#
# Note: GitHub disables scheduled workflows in repositories with no activity
# for 60 days. If you stop committing for a while, GitHub emails you before
# that happens — just click "keep workflow enabled", or push any commit.
name: Keep Supabase awake

on:
  schedule:
    - cron: '23 6 * * 1,4' # 06:23 UTC every Monday and Thursday
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write a keepalive row
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://vxvdfduynwpszffhojld.supabase.co' }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SERVICE_KEY" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY repo secret is not set — see README.md for one-time setup." >&2
            exit 1
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "$SUPABASE_URL/rest/v1/_keepalive" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"id\":1,\"pinged_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          echo "Supabase responded with HTTP $code"
          case "$code" in
            2*) exit 0 ;;
            *) echo "Unexpected status — check that the _keepalive table exists and the service-role secret is correct."; exit 1 ;;
          esac
